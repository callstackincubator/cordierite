name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Lint
        run: bun run lint

  playground-build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all workspace packages
        run: bun run build

      - name: Prebuild Android (Expo)
        working-directory: playground
        env:
          CI: "true"
          EXPO_NO_TELEMETRY: "1"
        run: bunx expo prebuild --platform android --no-install

      - name: Setup Gradle (wrapper + dependency cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android native dependencies (Gradle)
        working-directory: playground/android
        run: ./gradlew dependencies --no-daemon

      - name: Assemble debug APK
        working-directory: playground/android
        run: ./gradlew assembleDebug --no-daemon

  playground-build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all workspace packages
        run: bun run build

      - name: Prebuild iOS (Expo)
        working-directory: playground
        env:
          CI: "true"
          EXPO_NO_TELEMETRY: "1"
          LANG: en_US.UTF-8
        run: bunx expo prebuild --platform ios

      - name: Build for iOS Simulator
        working-directory: playground/ios
        run: |
          xcodebuild \
            -workspace playground.xcworkspace \
            -scheme playground \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            build \
            CODE_SIGNING_ALLOWED=NO
